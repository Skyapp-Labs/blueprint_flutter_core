name: blueprint_flutter_core
description: A modular Flutter core package providing UI components, theming, and feature modules for scalable apps.
version: 0.0.1
publish_to: "https://pub.dev"
homepage: https://github.com/Skyapp-Labs/blueprint_flutter_core

environment:
  sdk: ^3.10.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  country_flags: ^4.1.2

  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  go_router: ^17.1.0

  dio: ^5.8.0+1

  flutter_secure_storage: ^10.0.0

  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2

  jwt_decoder: ^2.0.1

  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  logger: ^2.5.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.15
  riverpod_generator: ^4.0.0+1
  freezed: ^3.0.0
  json_serializable: ^6.9.5

  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/countries.json
